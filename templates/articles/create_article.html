<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Create Article</title>
</head>
<body>
    <h1>Create Article</h1>

    <p>
        <a href="{% url 'choose_book' %}">Back to books</a> |
        <a href="{% url 'my_articles' %}">Back to my articles</a>
    </p>

    <h3>Selected book</h3>
    <p><strong>Title:</strong> {{ book.title }}</p>
    <p><strong>Description:</strong> {{ book.description }}</p>
    <p><strong>Submission deadline:</strong> {{ book.submission_deadline }}</p>
    <p><strong>Submission mode:</strong> {{ book.get_submission_mode_display }}</p>

    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Save article</button>
    </form>
</body>
</html>
