{% extends "base.html" %}

{% block title %}Edit Article{% endblock %}

{% block content %}
<h1 class="page-title">Edit Article</h1>
<p class="page-intro">
    Update the article title, abstract or file before the next review round.
</p>

<p>
    <a href="{% url 'article_detail' article.id %}" class="btn btn-secondary">Back to article</a>
</p>

<div class="form-panel">
    <p class="item-meta"><strong>Book:</strong> {{ article.book }}</p>

    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Save changes</button>
    </form>
</div>
{% endblock %}
