{% extends "base.html" %}

{% block title %}Register{% endblock %}

{% block content %}
<h1 class="page-title">Register</h1>
<p class="page-intro">
    Create an account to participate in the editorial process.
</p>

<div class="form-panel">
    <form method="post">
        {% csrf_token %}
    
        {% if next %}
            <input type="hidden" name="next" value="{{ next }}">
        {% endif %}
    
        {% if hide_role %}
            <p class="item-meta">
                Role: Author
            </p>
        {% endif %}
    
        {{ form.as_p }}
        <button type="submit">Create account</button>
    </form>
</div>
{% endblock %}
