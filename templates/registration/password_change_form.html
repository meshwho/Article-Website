{% extends "base.html" %}

{% block title %}Change Password{% endblock %}

{% block content %}
<h1 class="page-title">Change Password</h1>
<p class="page-intro">
    Enter your current password and choose a new one.
</p>

<div class="form-panel">
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Save new password</button>
    </form>
</div>
{% endblock %}
