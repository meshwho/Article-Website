{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
<h1 class="page-title">Login</h1>
<p class="page-intro">
    Enter your credentials to access your dashboard.
</p>

<div class="form-panel">
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Sign in</button>
    </form>
</div>
{% endblock %}
