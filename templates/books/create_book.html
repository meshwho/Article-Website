{% extends "base.html" %}

{% block title %}Create Book{% endblock %}

{% block content %}
<h1 class="page-title">Create Book</h1>
<p class="page-intro">
    Set up a new submission collection with its deadline and access mode.
</p>

<div class="form-panel">
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Create book</button>
    </form>
</div>
{% endblock %}
